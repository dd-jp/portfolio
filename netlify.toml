[build]
  command = "yarn build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Single-page app: serve index.html for any unknown path (defensive; the site uses hash anchors).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long-cache immutable hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
